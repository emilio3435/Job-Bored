name: Validate contract

on:
  push:
    branches: [main]
    paths:
      - "examples/**"
      - "schemas/**"
      - "app.js"
      - "README.md"
      - "CONTRIBUTING.md"
      - "integrations/**"
      - "scripts/test-contract.mjs"
      - "scripts/test-pipeline-contract.mjs"
      - "scripts/lint-integration-skills.mjs"
      - "package.json"
      - "package-lock.json"
  pull_request:
    branches: [main]
    paths:
      - "examples/**"
      - "schemas/**"
      - "app.js"
      - "README.md"
      - "CONTRIBUTING.md"
      - "integrations/**"
      - "scripts/test-contract.mjs"
      - "scripts/test-pipeline-contract.mjs"
      - "scripts/lint-integration-skills.mjs"
      - "package.json"
      - "package-lock.json"

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Contract suite (discovery + pipeline + skill links)
        run: npm run test:contract:all
