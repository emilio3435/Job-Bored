name: gitleaks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded gitleaks runs on the same PR ref; never cancel main
# pushes so we always finish a full scan of the tip of main.
concurrency:
  group: gitleaks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
