name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# One run per PR (or per branch on push); superseded PR runs are cancelled,
# pushes to main always run to completion.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Branch-protection (ruleset) currently ENFORCES these checks — a failure
# blocks the merge:
#   - contract-tests
#   - test
#   - scan   (gitleaks secret scan, .github/workflows/gitleaks.yml)
# Defined here and INTENDED to become required once stable (add each to the
# ruleset to enforce): lint, coverage, audit:prod, pr-lint (pr-lint.yml).
# Advisory only (never blocks a merge): e2e-smoke, audit:dev
# Auto-release: .github/workflows/release.yml (release-please, runs on main
# pushes, opens a release PR — does not block PR merges).

jobs:
  contract-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:contract:all

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck:repo
      - run: npm test
      - run: npm run test:browser-use-discovery

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint:repo

  # Browser boot-and-visibility smoke (tests/e2e-smoke). Non-blocking: it
  # reports signal on CSS-cascade/wiring/boot-error regressions but is not a
  # required check, so flakes never hold up a merge.
  e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e-smoke
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-smoke-traces
          path: tests/e2e-smoke/test-results/
          retention-days: 7

  # Blocking: c8-driven coverage under scripts/run-tests.mjs with thresholds
  # enforced by `npm run test:coverage`. The lcov report is uploaded as the
  # `coverage-report` artifact for the coverage-comment workflow.
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - name: Unit suite under c8 (blocking)
        run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # Advisory: full audit across ALL deps (including dev). Stays non-blocking
  # so a dev-dep vuln surfaces as a signal without holding up a merge. The
  # blocking prod-only gate is audit:prod below.
  audit:dev:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm audit --audit-level=high

  # Blocking: production-deps audit. High-severity production vulns fail the
  # required status check, so the merge is held until they are resolved.
  audit:prod:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm audit --omit=dev --audit-level=high
