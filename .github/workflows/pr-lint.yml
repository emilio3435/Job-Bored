name: PR lint

# Enforce Conventional Commits on PR titles. The `pr-lint` job is a required
# status check (wire it into branch protection alongside the required jobs in
# ci.yml: contract-tests, test, lint, audit:prod, coverage).
on:
  pull_request_target:
    types: [opened, edited, reopened]

jobs:
  pr-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Conventional Commit types accepted by the repo.
          types: |
            feat
            fix
            chore
            perf
            test
            docs
            refactor
            build
            ci
            style
            revert
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject (the text after the type prefix) must start with a
            lowercase letter and read like a sentence (no trailing period).
