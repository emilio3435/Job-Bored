name: Coverage comment

# Posts a sticky per-PR coverage comment. The comment job runs only AFTER the
# CI workflow completes — that is when the `coverage-report` artifact exists.
# Running on `pull_request` directly (an earlier version did) races CI and
# hard-fails the artifact download. The cleanup job removes the comment when
# the PR closes. Both jobs are best-effort and never block a merge.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  pull_request:
    types: [closed]

concurrency:
  group: coverage-comment-${{ github.event.workflow_run.id || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  # On PR close, delete the sticky coverage comment if one exists.
  cleanup:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage-summary
          delete: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # After a CI run for a PR completes, post/update the sticky coverage comment.
  # Best-effort (continue-on-error): a missing artifact or unresolved PR number
  # never blocks a merge.
  comment:
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Resolve PR number
        id: pr
        env:
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
        run: |
          set -euo pipefail
          echo "number=${PR_NUMBER:-}" >> "$GITHUB_OUTPUT"

      - name: Download coverage artifact
        id: dl
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Build coverage comment body
        id: body
        run: |
          set -euo pipefail
          if [ -f coverage/coverage-summary.json ]; then
            python3 - <<'PY'
          import json, os
          with open("coverage/coverage-summary.json") as f:
              data = json.load(f)
          totals = data.get("total", {})
          def pct(key):
              v = totals.get(key, {})
              pct_val = v.get("pct")
              return f"{pct_val:.2f}%" if isinstance(pct_val, (int, float)) else "n/a"
          body = (
              "## Coverage summary\n\n"
              "Coverage summary posted by CI.\n\n"
              "| Metric      | Percent |\n"
              "|-------------|--------:|\n"
              f"| Statements  | {pct('statements')} |\n"
              f"| Branches    | {pct('branches')} |\n"
              f"| Functions   | {pct('functions')} |\n"
              f"| Lines       | {pct('lines')} |\n"
          )
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("body<<EOF\n" + body + "EOF\n")
          PY
          else
            {
              echo "body<<EOF"
              echo "## Coverage summary"
              echo ""
              echo "Coverage summary posted by CI, but no coverage report was found in the artifact."
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - uses: marocchino/sticky-pull-request-comment@v2
        if: steps.pr.outputs.number != ''
        with:
          header: coverage-summary
          number: ${{ steps.pr.outputs.number }}
          body: ${{ steps.body.outputs.body }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
