# Command Center — POST discovery webhook from GitHub Actions (no browser CORS)
#
# Copy this file to: .github/workflows/command-center-discovery.yml
# Set repository secrets (see templates/github-actions/README.md)

name: Command Center discovery ping

on:
  workflow_dispatch:
  schedule:
    # Daily 06:00 America/Chicago — 11:00 UTC during CDT, 12:00 UTC during CST.
    - cron: "0 11,12 * * *"

jobs:
  discovery:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: POST discovery webhook
        env:
          WEBHOOK_URL: ${{ secrets.COMMAND_CENTER_DISCOVERY_WEBHOOK_URL }}
          SHEET_ID: ${{ secrets.COMMAND_CENTER_SHEET_ID }}
          WEBHOOK_SECRET: ${{ secrets.COMMAND_CENTER_DISCOVERY_WEBHOOK_SECRET }}
          COMMAND_CENTER_DISCOVERY_PROFILE_JSON: ${{ secrets.COMMAND_CENTER_DISCOVERY_PROFILE_JSON }}
          COMMAND_CENTER_DISCOVERY_PREFERENCES_JSON: ${{ secrets.COMMAND_CENTER_DISCOVERY_PREFERENCES_JSON }}
        run: |
          set -euo pipefail
          if [ -z "${WEBHOOK_URL:-}" ] || [ -z "${SHEET_ID:-}" ]; then
            echo "Set secrets COMMAND_CENTER_DISCOVERY_WEBHOOK_URL and COMMAND_CENTER_SHEET_ID"
            exit 1
          fi
          LOCAL_TARGET="06:00"
          LOCAL_TIME="$(TZ=America/Chicago date +"%H:%M")"
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$LOCAL_TIME" != "$LOCAL_TARGET" ]; then
            echo "Skipping discovery: America/Chicago local time is $LOCAL_TIME, not $LOCAL_TARGET."
            exit 0
          fi
          BODY="$(node scripts/run-scheduled-discovery.mjs \
            --trigger scheduled-github \
            --sheet-id "$SHEET_ID" \
            --dry-run)"
          SECRET_HEADER=()
          if [ -n "${WEBHOOK_SECRET:-}" ]; then
            SECRET_HEADER=(-H "x-discovery-secret: ${WEBHOOK_SECRET}")
          fi
          curl -sS -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            "${SECRET_HEADER[@]}" \
            -d "$BODY" \
            -w "\nHTTP %{http_code}\n"
