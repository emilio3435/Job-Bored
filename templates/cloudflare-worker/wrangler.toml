# Example Wrangler config — copy and rename `name` as needed.
# Docs: https://developers.cloudflare.com/workers/wrangler/configuration/

name = "command-center-forward"
main = "worker.js"
compatibility_date = "2024-01-01"

# Optional: restrict browser Origin (default in worker is `*`).
# [vars]
# CORS_ORIGIN = "https://your-static-site.example"

# Secrets — set in your account, never commit real values:
#   wrangler secret put TARGET_URL
#     → paste your Apps Script Web app /exec URL (or other HTTPS POST endpoint)
#   wrangler secret put FORWARD_SECRET
#     → optional; if set, only POST https://<worker>/forward works and requires Bearer token
#   wrangler secret put DISCOVERY_SECRET
#     → worker's x-discovery-secret; injected on both /webhook and /discovery-profile
#       forwards AND on scheduled-cron refresh POSTs
#   wrangler secret put REFRESH_SHEET_ID
#     → (optional) explicit sheetId used by the scheduled refresh; falls back
#       to the worker's configured default sheet when omitted

# Daily cron trigger — replays the stored candidateProfile against Gemini so
# the worker-config company list refreshes without any dashboard interaction.
# Default: 08:00 UTC every day. Adjust for your timezone; edit to "0 14 * * *"
# for 14:00 UTC (= 07:00 Mountain Time), etc.
[triggers]
crons = ["0 8 * * *"]
