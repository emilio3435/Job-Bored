<!doctype html>
<html>
<head><meta charset="utf-8"><title>Universal Filler Fixture</title></head>
<body>
  <main>
    <h1>Apply for Senior Digital Marketing Consultant</h1>
    <form id="application-form">
      <div class="field">
        <label for="first_name">First Name *</label>
        <input id="first_name" name="first_name" required>
      </div>
      <div class="field">
        <label for="last_name">Last Name *</label>
        <input id="last_name" name="last_name" required>
      </div>
      <div class="field">
        <label for="email">Email *</label>
        <input id="email" name="email" type="email" required>
      </div>
      <div class="field">
        <label for="phone">Phone</label>
        <input id="phone" name="phone" type="tel">
      </div>
      <div class="field">
        <label for="linkedin">LinkedIn Profile</label>
        <input id="linkedin" name="linkedin">
      </div>
      <div class="field">
        <label for="resume">Resume *</label>
        <input id="resume" name="resume" type="file" required>
      </div>
      <div class="field">
        <label for="cover_letter">Cover Letter</label>
        <input id="cover_letter" name="cover_letter" type="file">
      </div>
      <div class="field">
        <label for="work_auth">Are you legally authorized to work in the United States?</label>
        <select id="work_auth" name="work_auth">
          <option value="">Select...</option>
          <option value="yes">Yes</option>
          <option value="no">No</option>
        </select>
      </div>
      <div class="field">
        <label for="sponsorship">Will you now or in the future require sponsorship?</label>
        <select id="sponsorship" name="sponsorship">
          <option value="">Select...</option>
          <option value="yes">Yes</option>
          <option value="no">No</option>
        </select>
      </div>
      <div class="field">
        <label for="salary">Desired salary</label>
        <input id="salary" name="salary">
      </div>
      <button id="continue" type="button">Continue</button>
      <button id="submit" type="submit">Submit Application</button>
    </form>
  </main>
</body>
</html>
